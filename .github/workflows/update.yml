name: Update TVBox Config

on:
  schedule:
    # GitHub Actions uses UTC. This runs every day at 02:00 UTC.
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Check sources
        run: npm run check

      - name: Build TVBox config
        run: npm run build

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/tvbox.json dist/status.json dist/check-result.json
          git commit -m "chore: update tvbox config" || echo "No changes to commit"
          git push
